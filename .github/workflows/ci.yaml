name: much_segmenter tests

run-name: ${{ github.actor }} is running CI pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  Unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Transformers 4.47.0 (needs >=3.9)
          - python-version: "3.9"
            transformers-version: "4.47.0"
          - python-version: "3.10"
            transformers-version: "4.47.0"
          - python-version: "3.11"
            transformers-version: "4.47.0"
          - python-version: "3.12"
            transformers-version: "4.47.0"

          # Transformers 4.52.4 (needs >=3.9)
          - python-version: "3.9"
            transformers-version: "4.52.4"
          - python-version: "3.10"
            transformers-version: "4.52.4"
          - python-version: "3.11"
            transformers-version: "4.52.4"
          - python-version: "3.12"
            transformers-version: "4.52.4"

          # Latest Transformers (assume >=3.9)
          - python-version: "3.9"
            transformers-version: "latest"
          - python-version: "3.10"
            transformers-version: "latest"
          - python-version: "3.11"
            transformers-version: "latest"
          - python-version: "3.12"
            transformers-version: "latest"

          # Legacy Python 3.8 → limited support
          - python-version: "3.8"
            transformers-version: "4.46.3"

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/ci-requirements.txt
          if [ "${{ matrix.transformers-version }}" = "latest" ]; then
            pip install transformers
          else
            pip install transformers==${{ matrix.transformers-version }}
          fi

      - name: Show installed dependencies
        run: pip freeze

      - name: Run unit tests
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: PYTHONPATH=. python -m pytest
